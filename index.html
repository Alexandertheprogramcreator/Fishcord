<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Fishcord V3</title>

<style>

/*
Ok future me:

Layout plan:

Left side = chat list
Right side = messages
Bottom = message input
Floating corner = video windows

Basically a mini Discord.
*/

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#1e1f22;
color:white;
}

/* sidebar */

#sidebar{
width:220px;
background:#2b2d31;
padding:10px;
display:flex;
flex-direction:column;
}

/* chat list */

#chatList{
flex:1;
overflow-y:auto;
}

/* chat button */

.chatItem{
padding:8px;
background:#3a3c41;
border-radius:5px;
margin-bottom:5px;
cursor:pointer;
}

.chatItem:hover{
background:#4a4d52;
}

/* main area */

#main{
flex:1;
display:flex;
flex-direction:column;
}

/* message container */

#messages{
flex:1;
overflow-y:auto;
padding:15px;
background:#313338;
}

.message{
margin-bottom:10px;
}

.timestamp{
font-size:10px;
opacity:0.6;
margin-left:5px;
}

/* message input bar */

#inputBar{
display:flex;
padding:10px;
background:#383a40;
}

#inputBar input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

#inputBar button{
margin-left:5px;
padding:10px;
border:none;
border-radius:6px;
background:#5865f2;
color:white;
cursor:pointer;
}

/* login card */

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#2b2d31;
padding:25px;
border-radius:10px;
}

/* video windows */

#videos{
position:absolute;
bottom:90px;
right:10px;
display:flex;
flex-direction:column;
}

video{
width:200px;
border-radius:6px;
margin:5px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">

<h3>Fishcord Login</h3>

<input id="email" placeholder="email"><br><br> <input id="password" type="password" placeholder="password"><br><br>

<button id="loginBtn">Login</button> <button id="signupBtn">Signup</button>

<p id="status"></p>

</div>

<!-- SIDEBAR -->

<div id="sidebar" style="display:none">

<h3>Chats</h3>

<div id="chatList"></div>

<button id="createChat">Create Chat</button>

</div>

<!-- MAIN CHAT -->

<div id="main" style="display:none">

<div id="messages"></div>

<div id="inputBar">

<input id="messageInput" placeholder="Send message">

<button id="sendBtn">Send</button>

<button id="callBtn">📞</button>

<button id="videoBtn">📹</button>

<button id="screenBtn">🖥</button>

</div>

</div>

<!-- VIDEO WINDOWS -->

<div id="videos">

<video id="localVideo" autoplay muted></video> <video id="remoteVideo" autoplay></video>

</div>

<script type="module">

/*
Import Firebase modules.
*/

import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
serverTimestamp,
doc,
setDoc,
getDocs,
deleteDoc,
getDoc
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/*
Replace with your Firebase project info.
*/

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_PROJECT.firebaseapp.com",
projectId:"YOUR_PROJECT"
};

const app=initializeApp(firebaseConfig);

const auth=getAuth();
const db=getFirestore();

/*
current chat room
*/

let currentChat=null;

/*
listener cleanup variable
*/

let unsubscribeMessages=null;

/*
UI elements
*/

const login=document.getElementById("login");
const sidebar=document.getElementById("sidebar");
const main=document.getElementById("main");

const chatList=document.getElementById("chatList");
const messages=document.getElementById("messages");

/*
LOGIN
*/

loginBtn.onclick=async()=>{

try{

await signInWithEmailAndPassword(auth,email.value,password.value);

}catch(e){

status.textContent=e.message;

}

};

/*
SIGNUP
*/

signupBtn.onclick=async()=>{

try{

const user=await createUserWithEmailAndPassword(auth,email.value,password.value);

await setDoc(doc(db,"users",user.user.email),{

role:"user"

});

}catch(e){

status.textContent=e.message;

}

};

/*
AUTH STATE
*/

onAuthStateChanged(auth,user=>{

if(user){

login.style.display="none";
sidebar.style.display="block";
main.style.display="flex";

loadChats();

}

});

/*
LOAD CHATS
*/

function loadChats(){

onSnapshot(collection(db,"chats"),snap=>{

chatList.innerHTML="";

const chats=[];

snap.forEach(c=>{

chats.push(c.id);

const div=document.createElement("div");

div.className="chatItem";
div.textContent=c.id;

div.onclick=()=>{

currentChat=c.id;
loadMessages();

};

chatList.appendChild(div);

});

if(!currentChat && chats.length>0){

currentChat=chats[Math.floor(Math.random()*chats.length)];
loadMessages();

}

});

}

/*
LOAD MESSAGES
*/

function loadMessages(){

if(unsubscribeMessages)unsubscribeMessages();

unsubscribeMessages=onSnapshot(

collection(db,"chats",currentChat,"messages"),

snap=>{

messages.innerHTML="";

snap.forEach(m=>{

const data=m.data();

const time=data.timestamp?.toDate().toLocaleTimeString()||"";

const div=document.createElement("div");

div.className="message";

div.innerHTML=data.sender+" : "+data.text+
'<span class="timestamp">'+time+'</span>';

messages.appendChild(div);

});

messages.scrollTop=messages.scrollHeight;

});

}

/*
SEND MESSAGE
*/

sendBtn.onclick=async()=>{

const text=messageInput.value.trim();

if(!text)return;

/*
Simple command
*/

if(text==="/clear"){

const snap=await getDocs(collection(db,"chats",currentChat,"messages"));

for(const m of snap.docs){

await deleteDoc(m.ref);

}

messageInput.value="";
return;

}

await addDoc(collection(db,"chats",currentChat,"messages"),{

sender:auth.currentUser.email,
text:text,
timestamp:serverTimestamp()

});

messageInput.value="";

};

/*
CREATE CHAT
*/

createChat.onclick=async()=>{

const name=prompt("Chat name");

if(!name)return;

await setDoc(doc(db,"chats",name),{

created:Date.now()

});

};

/*
========================
WEBRTC VIDEO SYSTEM
========================
*/

let localStream;
let peerConnection;

const servers={
iceServers:[
{urls:"stun:stun.l.google.com:19302"}
]
};

/*
START VIDEO CALL
*/

videoBtn.onclick=startVideoCall;

async function startVideoCall(){

localStream=await navigator.mediaDevices.getUserMedia({
audio:true,
video:true
});

localVideo.srcObject=localStream;

peerConnection=new RTCPeerConnection(servers);

localStream.getTracks().forEach(track=>{
peerConnection.addTrack(track,localStream);
});

peerConnection.ontrack=e=>{
remoteVideo.srcObject=e.streams[0];
};

/*
Create offer
*/

const offer=await peerConnection.createOffer();

await peerConnection.setLocalDescription(offer);

/*
Store offer in Firebase
*/

await setDoc(doc(db,"calls",currentChat),{
offer:offer
});

}

/*
JOIN CALL
*/

onSnapshot(doc(db,"calls",currentChat),async snap=>{

const data=snap.data();

if(!peerConnection && data?.offer){

peerConnection=new RTCPeerConnection(servers);

localStream=await navigator.mediaDevices.getUserMedia({
audio:true,
video:true
});

localStream.getTracks().forEach(track=>{
peerConnection.addTrack(track,localStream);
});

peerConnection.ontrack=e=>{
remoteVideo.srcObject=e.streams[0];
};

await peerConnection.setRemoteDescription(data.offer);

const answer=await peerConnection.createAnswer();

await peerConnection.setLocalDescription(answer);

await setDoc(doc(db,"calls",currentChat),{
answer:answer
},{merge:true});

}

});

/*
SCREEN SHARE
*/

screenBtn.onclick=async()=>{

const screenStream=await navigator.mediaDevices.getDisplayMedia({
video:true
});

localVideo.srcObject=screenStream;

const screenTrack=screenStream.getVideoTracks()[0];

const sender=peerConnection.getSenders()
.find(s=>s.track.kind==="video");

if(sender){

sender.replaceTrack(screenTrack);

}

screenTrack.onended=()=>{

videoBtn.click();

};

};

</script>

</body>
</html>
