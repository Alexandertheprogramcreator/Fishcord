<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fischcord</title>

<style>
body{
  font-family:Arial;
  background:url("FISHCORD-BACKGROUND.jpg") center/cover fixed;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  width:420px;
  padding:20px;
  border-radius:10px;
}

input,select,button{
  width:100%;
  margin-top:10px;
  padding:10px;
}

#messages{
  height:300px;
  overflow:auto;
  background:#001eff;
  color:white;
  padding:10px;
}

.badge{
  font-size:10px;
  padding:2px 6px;
  border-radius:4px;
  margin-right:5px;
}
</style>
</head>

<body>

<div id="loginCard" class="card">
  <input id="emailInput" placeholder="email">
  <input id="passwordInput" type="password" placeholder="password">
  <button id="loginBtn">Login</button>
  <button id="signupBtn">Signup</button>
</div>

<div id="chatCard" class="card" style="display:none">
  <div id="messages"></div>
  <input id="messageInput">
  <button id="sendBtn">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, addDoc, collection, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBUkrpmXoPqtmEtxUXBSqTpGW56bCk5LHo",
  authDomain:"yappatr0n.firebaseapp.com",
  projectId:"yappatr0n",
  storageBucket:"yappatr0n.firebasestorage.app",
  messagingSenderId:"1023173924999",
  appId:"1:1023173924999:web:3c7cb4444b4433df730022"
});

const auth = getAuth(app);
const db = getFirestore(app);

const DEV = "alexanderjsanders@gmail.com";

let rolesCache = {};

// LOAD CUSTOM ROLES
onSnapshot(collection(db,"roles"), snap=>{
  rolesCache = {};
  snap.forEach(r=>{
    rolesCache[r.id] = r.data();
  });
});

// SIGNUP
signupBtn.onclick = async ()=>{
  const user = await createUserWithEmailAndPassword(auth,emailInput.value,passwordInput.value);
  await setDoc(doc(db,"users",user.user.email),{
    role:"user",
    level:"user",
    muted:false,
    banned:false
  });
};

// LOGIN
loginBtn.onclick = ()=> signInWithEmailAndPassword(auth,emailInput.value,passwordInput.value);

// AUTH
onAuthStateChanged(auth, async user=>{
  if(!user) return;
  loginCard.style.display="none";
  chatCard.style.display="block";
  loadMessages();
});

// PERMISSION CHECK
function hasPerm(level, needed){
  const order = ["user","moderator","admin","owner","dev"];
  return order.indexOf(level) >= order.indexOf(needed);
}

// BADGE
function badge(userData,email){
  if(email===DEV) return `<span class="badge" style="background:purple">DEV</span>`;

  const custom = rolesCache[userData.role];
  if(custom){
    return `<span class="badge" style="background:${custom.color}">${custom.name}</span>`;
  }

  return `<span class="badge" style="background:gray">${userData.role}</span>`;
}

// LOAD MESSAGES
function loadMessages(){
  onSnapshot(collection(db,"messages"), async snap=>{
    messages.innerHTML="";
    for(const m of snap.docs){
      const data=m.data();
      const u = await getDoc(doc(db,"users",data.sender));
      const userData = u.data();

      const div=document.createElement("div");
      div.innerHTML = badge(userData,data.sender)+data.sender+": "+data.text;
      messages.appendChild(div);
    }
  });
}

// SEND
sendBtn.onclick = async ()=>{
  const text = messageInput.value;
  if(!text) return;

  const userDoc = await getDoc(doc(db,"users",auth.currentUser.email));
  const me = userDoc.data();

  const myLevel = auth.currentUser.email===DEV ? "dev" : me.level;

  // COMMANDS
  if(text.startsWith("/")){
    const args=text.split(" ");

    // CUSTOM ROLE (DEV ONLY)
    if(args[0]==="/customrole"){
      if(auth.currentUser.email!==DEV) return alert("DEV ONLY");

      const name = prompt("Role name?");
      const color = prompt("Hex color? (#ff0000)");
      const level = prompt("Permission level? (user/moderator/admin/owner)");

      if(!name || !color || !level) return alert("Invalid");

      await setDoc(doc(db,"roles",name.toLowerCase()),{
        name,
        color,
        level
      });

      alert("Custom role created!");
      return;
    }

    // PROMOTE
    if(args[0]==="/promote"){
      const target=args[1];
      const role=args[2];

      const roleData = rolesCache[role] || {level:role};

      // ONLY DEV CAN TOUCH OWNER
      if(roleData.level==="owner" && auth.currentUser.email!==DEV){
        return alert("Only DEV can assign OWNER");
      }

      await setDoc(doc(db,"users",target),{
        role:role,
        level:roleData.level
      },{merge:true});

      alert("Updated role");
      return;
    }
  }

  if(me.banned) return alert("Banned");
  if(me.muted) return alert("Muted");

  await addDoc(collection(db,"messages"),{
    sender:auth.currentUser.email,
    text,
    timestamp:serverTimestamp()
  });

  messageInput.value="";
};
</script>

</body>
</html>
