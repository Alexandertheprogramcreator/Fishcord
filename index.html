<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Yappatr0n</title>
</head>
<body>

<h2>Sign Up</h2>
<input id="emailInput" placeholder="Email">
<input id="passwordInput" type="password" placeholder="Password">
<button id="signupBtn">Sign Up</button>

<h2>Log In</h2>
<input id="loginEmailInput" placeholder="Email">
<input id="loginPasswordInput" type="password" placeholder="Password">
<button id="loginBtn">Log In</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBUkrpmXoPqtmEtxUXBSqTpGW56bCk5LHo", authDomain: "yappatr0n.firebaseapp.com", projectId: "yappatr0n", storageBucket: "yappatr0n.firebasestorage.app", messagingSenderId: "1023173924999", appId: "1:1023173924999:web:3c7cb4444b4433df730022", measurementId: "G-KGBX045412"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const emailInput = document.getElementById("emailInput");
const passwordInput = document.getElementById("passwordInput");

const loginEmailInput = document.getElementById("loginEmailInput");
const loginPasswordInput = document.getElementById("loginPasswordInput");

const signupBtn = document.getElementById("signupBtn");
const loginBtn = document.getElementById("loginBtn");
const status = document.getElementById("status");

signupBtn.onclick = async () => {
  try {

    const email = emailInput.value;
    const pass = passwordInput.value;

    const userCred = await createUserWithEmailAndPassword(auth, email, pass);

    await setDoc(doc(db,"users",userCred.user.uid),{
      role:"user",
      muted:false,
      banned:false
    });

    status.textContent = "Account created";

  } catch(err) {
    console.error(err);
    status.textContent = err.message;
  }
};

loginBtn.onclick = async () => {
  try {

    const email = loginEmailInput.value;
    const pass = loginPasswordInput.value;

    const userCred = await signInWithEmailAndPassword(auth,email,pass);

    const userDoc = await getDoc(doc(db,"users",userCred.user.uid));

    if(userDoc.exists() && userDoc.data().banned){
      status.textContent = "You are banned";
      return;
    }

    status.textContent = "Logged in";

  } catch(err){
    console.error(err);
    status.textContent = err.message;
  }
};

</script>

</body>
</html>
