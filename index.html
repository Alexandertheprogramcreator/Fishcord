<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Fishcord Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
/* ---------- THEME VARIABLES ---------- */
:root {
  --bg: #0d1117;
  --panel: #161b22;
  --panel-light: #1e2530;
  --border: #30363d;
  --text: #e6edf3;
  --subtext: #8b949e;
  --accent: #2389ff;
  --accent-hover: #1f6fe0;
  --bubble: #1b222c;
}

.light {
  --bg: #f2f5f8;
  --panel: #ffffff;
  --panel-light: #e9eef3;
  --border: #cfd6dd;
  --text: #1a1d21;
  --subtext: #5a6168;
  --accent: #007bff;
  --accent-hover: #0062cc;
  --bubble: #eef2f6;
}

/* ---------- GLOBAL ---------- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ---------- SIDEBAR ---------- */
.sidebar {
  width: 240px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 15px;
  font-size: 1.3rem;
}

.channel {
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 6px;
  transition: 0.15s;
  color: var(--subtext);
}

.channel:hover {
  background: var(--panel-light);
  color: var(--text);
}

.channel.active {
  background: var(--accent);
  color: white;
}

/* ---------- MAIN CHAT AREA ---------- */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 15px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h2 {
  font-size: 1.2rem;
}

.theme-toggle {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--panel-light);
  cursor: pointer;
  transition: 0.15s;
}

.theme-toggle:hover {
  background: var(--accent);
  color: white;
}

/* ---------- MESSAGES ---------- */
.messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.msg {
  margin-bottom: 15px;
  animation: fadeIn 0.25s ease-out;
}

.msg strong {
  color: var(--accent);
}

.bubble {
  background: var(--bubble);
  padding: 10px 14px;
  border-radius: 10px;
  margin-top: 4px;
  display: inline-block;
  max-width: 70%;
}

/* ---------- TYPING INDICATOR ---------- */
.typing {
  display: none;
  margin-bottom: 10px;
  color: var(--subtext);
  font-style: italic;
}

/* ---------- INPUT AREA ---------- */
.input-area {
  padding: 15px;
  border-top: 1px solid var(--border);
  background: var(--panel);
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--panel-light);
  color: var(--text);
}

button.send {
  padding: 12px 18px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  transition: 0.15s;
}

button.send:hover {
  background: var(--accent-hover);
}

/* ---------- ANIMATIONS ---------- */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<!-- ---------- SIDEBAR ---------- -->
<div class="sidebar">
  <h2>Fishcord</h2>
  <div class="channel active"># general</div>
  <div class="channel"># fish-tank</div>
  <div class="channel"># memes</div>
  <div class="channel"># aquarium-help</div>
</div>

<!-- ---------- MAIN CHAT ---------- -->
<div class="main">
  <div class="header">
    <h2># general</h2>
    <button class="theme-toggle">Toggle Theme</button>
  </div>

  <div class="messages" id="messages">
    <div class="msg">
      <strong>FishBot</strong>
      <div class="bubble">Welcome to the upgraded Fishcord experience.</div>
    </div>
  </div>

  <div class="typing" id="typing">FishBot is typing…</div>

  <div class="input-area">
    <input id="msgInput" type="text" placeholder="Send a message…" />
    <button class="send" id="sendBtn">Send</button>
  </div>
</div>

<script>
const input = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");
const messages = document.getElementById("messages");
const typing = document.getElementById("typing");
const themeToggle = document.querySelector(".theme-toggle");

function addMessage(author, text) {
  const msg = document.createElement("div");
  msg.className = "msg";
  msg.innerHTML = `<strong>${author}</strong><div class="bubble">${text}</div>`;
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage("You", text);
  input.value = "";

  typing.style.display = "block";

  setTimeout(() => {
    typing.style.display = "none";
    const replies = [
      "Interesting… tell me more.",
      "I like the way you think.",
      "FishBot approves this message.",
      "That’s actually pretty cool.",
      "I hadn’t considered that before."
    ];
    const reply = replies[Math.floor(Math.random() * replies.length)];
    addMessage("FishBot", reply);
  }, 700);
}

sendBtn.onclick = sendMessage;
input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

themeToggle.onclick = () => {4
  document.body.classList.toggle("light");
};
</script>

</body>
</html>
